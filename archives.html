  <title>archives</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .typewriter-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      z-index: 0;
      pointer-events: none;
    }
    .typewriter-row {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #ebebeb;
      white-space: nowrap;
      overflow: hidden;
      text-transform: uppercase;
      animation: slide 12s linear infinite;
    }
    .typewriter-row:nth-child(even) { animation-duration: 15s; animation-delay: -5s; }
    .typewriter-row:nth-child(3n) { animation-duration: 10s; animation-delay: -2s; }
    @keyframes slide {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .container { position: relative; z-index: 1; }

    .all-photos {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
    }

    .all-photos img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      pointer-events: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
  </style>
</head>

    <div id="password-box" style="display:none; margin-top:8px;">
      <input type="password" id="password-input" placeholder="enter password" style="font-family: 'Courier New', monospace; font-size:12px; padding:6px; border:1px solid #aaa; outline:none; width:140px;"/>
      <button onclick="checkPassword()" style="font-family: 'Courier New', monospace; font-size:12px; padding:6px 10px; border:1px solid #aaa; background:#111; color:#fff; cursor:pointer; margin-left:4px;">enter</button>
      <p id="wrong-password" style="display:none; color:red; font-size:11px; margin-top:4px;">wrong password.</p>
    </div>
  </div>

  <script>
    var bg = document.getElementById('typewriter-bg');
    var rows = Math.ceil(window.innerHeight / 24);
    for (var i = 0; i < rows; i++) {
      var row = document.createElement('div');
      row.className = 'typewriter-row';
      row.textContent = 'WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME';
      bg.appendChild(row);
    }

    document.getElementById('lost-files-btn').addEventListener('click', function() {
      var box = document.getElementById('password-box');
      box.style.display = box.style.display === 'none' ? 'block' : 'none';
    });

    function checkPassword() {
      var input = document.getElementById('password-input').value;
      if (input === 'hi123') {
        window.location.href = 'lostfiles.html';
      } else {
        document.getElementById('wrong-password').style.display = 'block';
      }
    }

    document.getElementById('password-input').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') checkPassword();
    });
  </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>conerly</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .typewriter-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      z-index: 0;
      pointer-events: none;
    }
    .typewriter-row {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #ebebeb;
      white-space: nowrap;
      overflow: hidden;
      text-transform: uppercase;
      animation: slide 12s linear infinite;
    }
    .typewriter-row:nth-child(even) { animation-duration: 15s; animation-delay: -5s; }
    .typewriter-row:nth-child(3n) { animation-duration: 10s; animation-delay: -2s; }
    @keyframes slide {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .container { position: relative; z-index: 1; }

    .music-btn {
      background-color: red;
      color: white;
      border: 2px solid black;
      padding: 14px 28px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      letter-spacing: 0.1em;
      cursor: pointer;
    }
    .music-btn:hover {
      background-color: darkred;
    }
  </style>
</head>
<body>

  <div class="typewriter-bg" id="typewriter-bg"></div>

  <audio id="bg-music" src="music.mp3" loop></audio>

  <main class="container">

    <nav class="top-links">
      <a href="message.html">click this</a>
    </nav>

    <div style="display: flex; justify-content: center; margin: 20px 0;">
      <button class="music-btn" onclick="document.getElementById('bg-music').play()">
        click to hear my fav song rn
      </button>
    </div>

    <div class="folder-grid">

      <!-- Top left folder → goes to folder1.html -->
      <a href="folder1.html" class="folder">
        <svg width="64" height="56" viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="10" width="60" height="44" fill="#d0d0d0" stroke="#000" stroke-width="2"/>
          <rect x="2" y="6" width="24" height="8" fill="#d0d0d0" stroke="#000" stroke-width="2"/>
          <rect x="4" y="12" width="56" height="40" fill="#e8e8e8" stroke="#000" stroke-width="1"/>
          <line x1="4" y1="16" x2="60" y2="16" stroke="#aaa" stroke-width="1"/>
        </svg>
        <span></span>
      </a>

      <!-- Hero video in the middle -->
      <div class="hero">
        <video src="hero.mp4" autoplay muted loop playsinline></video>
      </div>

      <!-- Top right folder -->
      <a href="2025.html" class="folder">
        <svg width="64" height="56" viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="10" width="60" height="44" fill="#d0d0d0" stroke="#000" stroke-width="2"/>
          <rect x="2" y="6" width="24" height="8" fill="#d0d0d0" stroke="#000" stroke-width="2"/>
          <rect x="4" y="12" width="56" height="40" fill="#e8e8e8" stroke="#000" stroke-width="1"/>
          <line x1="4" y1="16" x2="60" y2="16" stroke="#aaa" stroke-width="1"/>
        </svg>
        <span></span>
      </a>

      <!-- Bottom left folder → Archives -->
      <a href="archives.html" class="folder folder-bottom-left">
        <svg width="64" height="56" viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="10" width="60" height="44" fill="#d0d0d0" stroke="#000" stroke-width="2"/>
          <rect x="2" y="6" width="24" height="8" fill="#d0d0d0" stroke="#000" stroke-width="2"/>
          <rect x="4" y="12" width="56" height="40" fill="#e8e8e8" stroke="#000" stroke-width="1"/>
          <line x1="4" y1="16" x2="60" y2="16" stroke="#aaa" stroke-width="1"/>
        </svg>
        <span>archives</span>
      </a>

    </div>

    <section class="socials">
      <a href="https://www.instagram.com/jacobxconerly" target="_blank" class="socials-right">instagram</a>
    </section>

  </main>

  <script>
    var bg = document.getElementById('typewriter-bg');
    var rows = Math.ceil(window.innerHeight / 24);
    for (var i = 0; i < rows; i++) {
      var row = document.createElement('div');
      row.className = 'typewriter-row';
      row.textContent = 'WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME';
      bg.appendChild(row);
    }
  </script>

</body>
</html>

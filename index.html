<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>conerly</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Courier New', Courier, monospace;
    }

    body {
      background-color: #ffffff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .typewriter-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      z-index: 0;
      pointer-events: none;
    }

    .typewriter-row {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #e0e0e0;
      white-space: nowrap;
      overflow: hidden;
      text-transform: uppercase;
      animation: slide 12s linear infinite;
    }

    .typewriter-row:nth-child(even) {
      animation-duration: 15s;
      animation-delay: -5s;
    }

    .typewriter-row:nth-child(3n) {
      animation-duration: 10s;
      animation-delay: -2s;
    }

    @keyframes slide {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .gate {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .folder-wrap {
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .folder-wrap:hover {
      transform: scale(1.05);
    }

    .folder-wrap svg {
      width: 120px;
      height: 106px;
      image-rendering: pixelated;
    }

    .open-label {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #111;
      cursor: pointer;
    }

    /* ── Open animation overlay ── */
    .open-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #ffffff;
      z-index: 100;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .open-overlay.active {
      display: flex;
      animation: openUp 0.8s ease forwards;
    }

    .open-overlay svg {
      width: 200px;
      height: 180px;
      image-rendering: pixelated;
      animation: folderOpen 0.8s ease forwards;
    }

    @keyframes openUp {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; }
    }

    @keyframes folderOpen {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(2); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- Typewriter background -->
  <div class="typewriter-bg" id="typewriter-bg"></div>

  <!-- Center gate -->
  <div class="gate">
    <div class="folder-wrap" id="folder-btn">
      <svg viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="10" width="60" height="44" fill="#d0d0d0" stroke="#000" stroke-width="2"/>
        <rect x="2" y="6" width="24" height="8" fill="#d0d0d0" stroke="#000" stroke-width="2"/>
        <rect x="4" y="12" width="56" height="40" fill="#e8e8e8" stroke="#000" stroke-width="1"/>
        <line x1="4" y1="16" x2="60" y2="16" stroke="#aaa" stroke-width="1"/>
      </svg>
    </div>
    <div class="open-label">open</div>
  </div>

  <!-- Open animation overlay -->
  <div class="open-overlay" id="open-overlay">
    <svg viewBox="0 0 64 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2" y="10" width="60" height="44" fill="#d0d0d0" stroke="#000" stroke-width="2"/>
      <rect x="2" y="6" width="24" height="8" fill="#d0d0d0" stroke="#000" stroke-width="2"/>
      <rect x="4" y="12" width="56" height="40" fill="#e8e8e8" stroke="#000" stroke-width="1"/>
      <line x1="4" y1="16" x2="60" y2="16" stroke="#aaa" stroke-width="1"/>
    </svg>
  </div>

  <script>
    // Build typewriter rows
    var bg = document.getElementById('typewriter-bg');
    var rows = Math.ceil(window.innerHeight / 24);
    for (var i = 0; i < rows; i++) {
      var row = document.createElement('div');
      row.className = 'typewriter-row';
      row.textContent = 'WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME';
      bg.appendChild(row);
    }

    // Click folder to open
    document.getElementById('folder-btn').addEventListener('click', openFolder);
    document.querySelector('.open-label').addEventListener('click', openFolder);

    function openFolder() {
      var overlay = document.getElementById('open-overlay');
      overlay.classList.add('active');
      setTimeout(function() {
        window.location.href = 'home.html';
      }, 800);
    }
  </script>

</body>
</html>

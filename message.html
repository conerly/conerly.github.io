<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>A Message</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .typewriter-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      z-index: 0;
      pointer-events: none;
    }
    .typewriter-row {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: #ebebeb;
      white-space: nowrap;
      overflow: hidden;
      text-transform: uppercase;
      animation: slide 12s linear infinite;
    }
    .typewriter-row:nth-child(even) { animation-duration: 15s; animation-delay: -5s; }
    .typewriter-row:nth-child(3n) { animation-duration: 10s; animation-delay: -2s; }
    @keyframes slide {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .container { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="typewriter-bg" id="typewriter-bg"></div>
  <main class="container">
    <a href="home.html" class="back-link">← go back</a>
    <p class="message-text">dean eats meat </p>
  </main>
  <script>
    var bg = document.getElementById('typewriter-bg');
    var rows = Math.ceil(window.innerHeight / 24);
    for (var i = 0; i < rows; i++) {
      var row = document.createElement('div');
      row.className = 'typewriter-row';
      row.textContent = 'WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME WELCOME';
      bg.appendChild(row);
    }
  </script>
</body>
</html>
